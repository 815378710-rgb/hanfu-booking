<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>霓裳汉服 · 商家管理</title>
<script src="https://cdn.jsdelivr.net/npm/vue@3/dist/vue.global.prod.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --rose:#C4788A;--rose-l:#D9A5AA;--rose-ll:#F2E0E2;--rose-lll:#FBF3F4;
  --gold:#C9A87C;--gold-l:#E8D5B5;
  --ink:#2D2226;--ink-l:#6B5C62;--ink-ll:#9B8A90;--ink-lll:#C8B8BE;--ink-llll:#E5D8DC;
  --bg:#FAF7F5;--card:#FFFFFF;
  --ok:#5A9E6B;--ok-bg:rgba(90,158,107,.1);
  --warn:#D4A54A;--warn-bg:rgba(212,165,74,.1);
  --err:#D94F4F;--err-bg:rgba(217,79,79,.08);
  --blue:#5B8FD9;--blue-bg:rgba(91,143,217,.1);
  --r:14px;--rs:10px;
  --shadow:0 1px 8px rgba(45,34,38,.06);
  --shadow-lg:0 4px 24px rgba(45,34,38,.1);
  --sans:'Noto Sans SC','PingFang SC','Hiragino Sans GB','Microsoft YaHei',sans-serif;
  --serif:'Noto Serif SC','PingFang SC','Hiragino Sans GB','Microsoft YaHei',serif;
  --mono:'SF Mono','Fira Code',monospace;
}
html{font-size:16px}
body{font-family:var(--sans);background:var(--bg);color:var(--ink);max-width:430px;margin:0 auto;min-height:100vh;overflow-x:hidden;-webkit-font-smoothing:antialiased}

/* ═══ Login ═══ */
.login-wrap{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;background:linear-gradient(160deg,var(--bg) 0%,var(--rose-lll) 100%)}
.login-logo{font-family:var(--serif);font-size:32px;font-weight:600;color:var(--ink);letter-spacing:.15em;margin-bottom:4px}
.login-sub{font-size:11px;color:var(--ink-ll);letter-spacing:.3em;margin-bottom:40px;text-transform:uppercase}
.login-card{width:100%;background:var(--card);border-radius:20px;padding:28px 24px;box-shadow:var(--shadow-lg)}
.login-card h3{font-family:var(--serif);font-size:18px;font-weight:600;letter-spacing:.06em;margin-bottom:20px;text-align:center}
.login-field{margin-bottom:16px}
.login-field label{display:block;font-size:11px;font-weight:500;color:var(--ink-ll);letter-spacing:.1em;margin-bottom:6px;text-transform:uppercase}
.login-field input{width:100%;border:1.5px solid var(--ink-llll);border-radius:var(--rs);padding:12px 14px;font-size:15px;font-family:var(--sans);outline:none;transition:border .3s;background:var(--bg)}
.login-field input:focus{border-color:var(--rose);box-shadow:0 0 0 3px rgba(196,120,138,.1)}
.login-btn{width:100%;padding:14px;border:none;border-radius:26px;font-size:14px;font-weight:500;letter-spacing:.1em;color:#fff;background:var(--ink);cursor:pointer;font-family:var(--sans);transition:all .3s;margin-top:8px}
.login-btn:active{opacity:.85;transform:scale(.98)}
.login-btn:disabled{background:var(--ink-lll);cursor:not-allowed}
.login-error{font-size:12px;color:var(--err);text-align:center;margin-top:10px}
.login-hint{font-size:11px;color:var(--ink-ll);text-align:center;margin-top:16px;letter-spacing:.03em}

/* ═══ Header ═══ */
.hdr{background:var(--card);padding:14px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;border-bottom:1px solid var(--ink-llll);backdrop-filter:blur(16px)}
.hdr-title{font-family:var(--serif);font-size:17px;font-weight:600;letter-spacing:.08em}
.hdr-back{font-size:14px;cursor:pointer;color:var(--ink-l);background:none;border:none;font-family:var(--sans);font-weight:500;display:flex;align-items:center;gap:4px}
.hdr-right{display:flex;align-items:center;gap:8px}
.hdr-logout{font-size:12px;color:var(--ink-ll);cursor:pointer;background:none;border:none;padding:6px 12px;border-radius:16px;transition:all .2s;font-family:var(--sans)}
.hdr-logout:active{background:var(--rose-lll)}

/* ═══ Page ═══ */
.page{padding-bottom:24px;min-height:100vh}

/* ═══ Section ═══ */
.sec{padding:20px 16px 8px}
.sec-title{font-size:12px;font-weight:600;color:var(--ink-l);letter-spacing:.12em;display:flex;align-items:center;gap:8px}
.sec-title::before{content:'';width:3px;height:14px;background:var(--rose);border-radius:2px}
.sec-right{margin-left:auto;font-size:11px;color:var(--rose);cursor:pointer;font-weight:500}

/* ═══ Stat Cards ═══ */
.stats{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;padding:12px 16px}
.stat{background:var(--card);border-radius:var(--r);padding:16px;box-shadow:var(--shadow);position:relative;overflow:hidden}
.stat::after{content:'';position:absolute;top:0;right:0;width:40px;height:40px;border-radius:0 0 0 40px;opacity:.08}
.stat.rose::after{background:var(--rose)}.stat.green::after{background:var(--ok)}.stat.gold::after{background:var(--gold)}.stat.blue::after{background:var(--blue)}
.stat-label{font-size:11px;color:var(--ink-ll);letter-spacing:.08em;font-weight:400}
.stat-val{font-family:var(--serif);font-size:28px;font-weight:600;margin-top:4px;letter-spacing:.02em}
.stat-val.rose{color:var(--rose)}.stat-val.green{color:var(--ok)}.stat-val.gold{color:var(--gold)}.stat-val.blue{color:var(--blue)}
.stat-sub{font-size:10px;color:var(--ink-ll);margin-top:2px}

/* ═══ Full-width stat ═══ */
.stat-wide{background:var(--card);border-radius:var(--r);margin:0 16px;padding:16px 18px;box-shadow:var(--shadow);display:flex;align-items:center;justify-content:space-between}
.stat-wide .k{font-size:12px;color:var(--ink-l);letter-spacing:.05em}
.stat-wide .v{font-family:var(--serif);font-size:22px;font-weight:600;color:var(--rose)}

/* ═══ Trend Bar ═══ */
.trend{display:flex;align-items:flex-end;gap:4px;height:80px;padding:12px 16px;margin-bottom:8px}
.trend-bar{flex:1;border-radius:4px 4px 0 0;background:var(--rose-ll);min-height:4px;transition:height .4s;position:relative}
.trend-bar.active{background:var(--rose)}
.trend-label{position:absolute;bottom:-16px;left:50%;transform:translateX(-50%);font-size:9px;color:var(--ink-ll);white-space:nowrap}

/* ═══ Admin Grid ═══ */
.adm-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;padding:12px 16px}
.adm-card{background:var(--card);border-radius:var(--r);padding:20px 14px;text-align:center;box-shadow:var(--shadow);cursor:pointer;transition:all .2s;border:1.5px solid transparent}
.adm-card:active{transform:scale(.96);border-color:var(--rose-ll)}
.adm-card .icon{font-size:28px;margin-bottom:8px}
.adm-card .label{font-size:13px;font-weight:500;color:var(--ink);letter-spacing:.04em}
.adm-card .desc{font-size:10px;color:var(--ink-ll);margin-top:3px}
.adm-card .badge{display:inline-block;margin-top:6px;font-size:10px;font-weight:600;padding:2px 8px;border-radius:8px;background:var(--err-bg);color:var(--err)}

/* ═══ Order List ═══ */
.ord{background:var(--card);border-radius:var(--r);margin:8px 16px;overflow:hidden;box-shadow:var(--shadow)}
.ord-top{padding:10px 16px;display:flex;justify-content:space-between;align-items:center;background:var(--rose-lll)}
.ord-no{font-size:10px;color:var(--ink-ll);font-family:var(--mono);letter-spacing:.03em}
.badge{padding:3px 10px;border-radius:10px;font-size:10px;font-weight:600;letter-spacing:.05em}
.badge-pending{color:var(--warn);background:var(--warn-bg)}
.badge-booked{color:var(--ok);background:var(--ok-bg)}
.badge-completed{color:var(--ink-ll);background:rgba(0,0,0,.04)}
.badge-cancelled{color:var(--err);background:var(--err-bg)}
.ord-body{padding:14px 16px}
.ord-pkg{font-family:var(--serif);font-size:14px;font-weight:600;letter-spacing:.04em;margin-bottom:6px}
.ord-info{font-size:12px;color:var(--ink-l);line-height:2}
.ord-info b{color:var(--ink);font-weight:500}
.ord-foot{padding:10px 16px;display:flex;justify-content:space-between;align-items:center;border-top:1px solid var(--ink-llll)}
.ord-amount{font-family:var(--serif);font-size:18px;font-weight:600;color:var(--rose)}
.ord-time{font-size:10px;color:var(--ink-ll)}
.ord-acts{display:flex;gap:6px}

/* ═══ Announcements ═══ */
.ann{background:var(--card);border-radius:var(--r);margin:8px 16px;padding:14px 16px;box-shadow:var(--shadow);display:flex;gap:12px;align-items:flex-start}
.ann-icon{width:32px;height:32px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.ann-icon.info{background:var(--blue-bg)}.ann-icon.promo{background:var(--warn-bg)}.ann-icon.important{background:var(--err-bg)}
.ann-body{flex:1;min-width:0}
.ann-title{font-size:14px;font-weight:600;letter-spacing:.03em}
.ann-content{font-size:12px;color:var(--ink-l);margin-top:4px;line-height:1.6}
.ann-meta{font-size:10px;color:var(--ink-ll);margin-top:6px;display:flex;align-items:center;gap:8px}
.ann-acts{display:flex;gap:4px}

/* ═══ List Items ═══ */
.list{padding:8px 16px}
.item{background:var(--card);border-radius:var(--r);padding:12px 14px;margin-bottom:8px;box-shadow:var(--shadow);display:flex;align-items:center;gap:12px}
.item img{width:48px;height:48px;object-fit:cover;border-radius:var(--rs);flex-shrink:0}
.item-info{flex:1;min-width:0}
.item-name{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.item-sub{font-size:11px;color:var(--ink-ll);margin-top:2px}
.item-acts{display:flex;gap:4px;flex-shrink:0}

/* ═══ Buttons ═══ */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:4px;padding:8px 18px;border:none;border-radius:20px;font-size:12px;font-weight:500;cursor:pointer;font-family:var(--sans);letter-spacing:.03em;transition:all .2s}
.btn:active{transform:scale(.95)}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none}
.btn-dark{background:var(--ink);color:#fff}
.btn-rose{background:var(--rose);color:#fff;box-shadow:0 2px 8px rgba(196,120,138,.2)}
.btn-ok{background:var(--ok);color:#fff}
.btn-ghost{background:var(--rose-lll);color:var(--rose)}
.btn-outline{background:transparent;border:1px solid var(--ink-llll);color:var(--ink-l)}
.btn-err{background:var(--err-bg);color:var(--err)}
.btn-sm{padding:6px 12px;font-size:11px}
.btn-block{width:100%;padding:14px;font-size:14px;border-radius:26px}

/* ═══ Forms ═══ */
.form{padding:8px 16px}
.field{background:var(--card);border-radius:var(--r);padding:14px 16px;margin-bottom:10px;box-shadow:var(--shadow)}
.field label{display:block;font-size:10px;font-weight:500;color:var(--ink-ll);letter-spacing:.1em;margin-bottom:6px;text-transform:uppercase}
.field input,.field select,.field textarea{width:100%;border:none;outline:none;font-size:14px;font-family:var(--sans);background:transparent;color:var(--ink);line-height:1.5}
.field textarea{resize:vertical;min-height:60px}
.field input::placeholder,.field textarea::placeholder{color:var(--ink-lll)}
.field-hint{font-size:10px;color:var(--ink-ll);margin-top:4px}

/* ═══ Tags ═══ */
.tag{display:inline-block;padding:4px 10px;border-radius:10px;font-size:10px;font-weight:500;letter-spacing:.03em}
.tag-rose{background:var(--rose-lll);color:var(--rose)}
.tag-ok{background:var(--ok-bg);color:var(--ok)}
.tag-warn{background:var(--warn-bg);color:var(--warn)}
.tag-blue{background:var(--blue-bg);color:var(--blue)}

/* ═══ Switch ═══ */
.switch{position:relative;width:40px;height:22px;cursor:pointer;flex-shrink:0;display:inline-block}
.switch input{opacity:0;width:0;height:0}
.switch .slider{position:absolute;inset:0;background:var(--ink-llll);border-radius:22px;transition:.3s}
.switch .slider::before{content:'';position:absolute;width:18px;height:18px;border-radius:50%;background:#fff;left:2px;top:2px;transition:.3s;box-shadow:0 1px 4px rgba(0,0,0,.1)}
.switch input:checked+.slider{background:var(--rose)}
.switch input:checked+.slider::before{transform:translateX(18px)}

/* ═══ Toast ═══ */
.toast{position:fixed;top:42%;left:50%;transform:translate(-50%,-50%);background:var(--ink);color:#fff;padding:14px 28px;border-radius:14px;font-size:14px;z-index:300;animation:fadeIn .2s;box-shadow:0 8px 32px rgba(0,0,0,.2);display:flex;align-items:center;gap:6px;font-weight:400;letter-spacing:.03em}
@keyframes fadeIn{from{opacity:0;transform:translate(-50%,-50%) scale(.9)}to{opacity:1;transform:translate(-50%,-50%) scale(1)}}

/* ═══ Empty ═══ */
.empty{text-align:center;padding:40px 24px}
.empty-icon{font-size:36px;opacity:.4;margin-bottom:10px}
.empty-text{font-size:13px;color:var(--ink-ll)}

/* ═══ Tabs (bottom nav) ═══ */
.tabs{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:rgba(250,247,245,.95);backdrop-filter:blur(16px);border-top:1px solid var(--ink-llll);display:flex;z-index:100;padding:6px 0 env(safe-area-inset-bottom)}
.tab{flex:1;text-align:center;cursor:pointer;padding:4px 0;position:relative}
.tab-icon{font-size:18px;display:block;opacity:.35;transition:.3s}
.tab-label{font-size:10px;font-weight:500;color:var(--ink-ll);letter-spacing:.08em;transition:.3s}
.tab.on .tab-icon{opacity:1}
.tab.on .tab-label{color:var(--rose);font-weight:600}
.tab.on::after{content:'';position:absolute;bottom:-1px;left:50%;transform:translateX(-50%);width:16px;height:2px;background:var(--rose);border-radius:1px}
.tab-badge{position:absolute;top:-2px;right:50%;transform:translateX(14px);min-width:14px;height:14px;border-radius:7px;background:var(--err);color:#fff;font-size:8px;font-weight:700;display:flex;align-items:center;justify-content:center;padding:0 3px}

::-webkit-scrollbar{display:none}
body{padding-bottom:env(safe-area-inset-bottom)}
</style>
</head>
<body>
<div id="app">

<div v-if="toast" class="toast">{{toastMsg}}</div>

<!-- ═══════ LOGIN ═══════ -->
<div v-if="!merchant" class="login-wrap">
  <div class="login-logo">霓裳</div>
  <div class="login-sub">Merchant Dashboard</div>
  <div class="login-card">
    <h3>商家登录</h3>
    <div class="login-field">
      <label>用户名</label>
      <input v-model="loginForm.username" placeholder="请输入用户名" @keyup.enter="doLogin">
    </div>
    <div class="login-field">
      <label>密码</label>
      <input v-model="loginForm.password" type="password" placeholder="请输入密码" @keyup.enter="doLogin">
    </div>
    <button class="login-btn" @click="doLogin" :disabled="loginLoading">
      {{loginLoading ? '登录中...' : '登 录'}}
    </button>
    <div v-if="loginError" class="login-error">{{loginError}}</div>
    <div class="login-hint">默认账号: admin / admin123</div>
  </div>
</div>

<!-- ═══════ MAIN (after login) ═══════ -->
<template v-if="merchant">

<!-- ═══════ Dashboard ═══════ -->
<div v-show="page==='dashboard'" class="page" style="padding-bottom:70px">
  <div class="hdr">
    <div class="hdr-title">{{merchant.shop_name || '商家管理'}}</div>
    <div class="hdr-right">
      <button class="hdr-logout" @click="doLogout">退出</button>
    </div>
  </div>

  <div class="sec"><div class="sec-title">今日概览</div></div>
  <div class="stats">
    <div class="stat rose">
      <div class="stat-label">今日订单</div>
      <div class="stat-val rose">{{dash.today?.orders || 0}}</div>
      <div class="stat-sub">新增预约</div>
    </div>
    <div class="stat green">
      <div class="stat-label">今日收入</div>
      <div class="stat-val green">¥{{(dash.today?.revenue || 0).toFixed(0)}}</div>
      <div class="stat-sub">已确认收入</div>
    </div>
    <div class="stat gold">
      <div class="stat-label">今日到店</div>
      <div class="stat-val gold">{{dash.today?.booked_today || 0}}</div>
      <div class="stat-sub">待服务</div>
    </div>
    <div class="stat blue">
      <div class="stat-label">待处理</div>
      <div class="stat-val blue">{{dash.today?.pending || 0}}</div>
      <div class="stat-sub">待支付/待核销</div>
    </div>
  </div>

  <div class="sec"><div class="sec-title">本月数据</div></div>
  <div class="stats" style="grid-template-columns:repeat(3,1fr)">
    <div class="stat">
      <div class="stat-label">本月订单</div>
      <div class="stat-val" style="font-size:22px">{{dash.month?.orders || 0}}</div>
    </div>
    <div class="stat">
      <div class="stat-label">本月收入</div>
      <div class="stat-val rose" style="font-size:22px">¥{{(dash.month?.revenue || 0).toFixed(0)}}</div>
    </div>
    <div class="stat">
      <div class="stat-label">总用户</div>
      <div class="stat-val blue" style="font-size:22px">{{dash.total?.users || 0}}</div>
    </div>
  </div>

  <!-- 7-day trend -->
  <div class="sec" v-if="dash.trend?.length">
    <div class="sec-title">近7天趋势</div>
  </div>
  <div class="trend" v-if="dash.trend?.length">
    <div v-for="d in dash.trend" :key="d.date" class="trend-bar" :class="{active:d.date===todayStr}"
      :style="{height: Math.max(4, (d.orders / Math.max(1,...dash.trend.map(t=>t.orders))) * 52) + 'px'}">
      <div class="trend-label">{{d.date.slice(5)}}</div>
    </div>
  </div>
  <div style="height:24px"></div>

  <!-- Quick actions -->
  <div class="sec"><div class="sec-title">快捷操作</div></div>
  <div class="adm-grid">
    <div class="adm-card" @click="page='orders';loadOrders()">
      <div class="icon">📋</div><div class="label">订单管理</div><div class="desc">核销 · 退款</div>
      <div v-if="dash.today?.pending" class="badge">{{dash.today.pending}} 待处理</div>
    </div>
    <div class="adm-card" @click="page='photos';loadPhotos();loadCategories()">
      <div class="icon">📷</div><div class="label">客片管理</div><div class="desc">上传 · 分类</div>
    </div>
    <div class="adm-card" @click="page='pkgs';loadPackages()">
      <div class="icon">💄</div><div class="label">套餐管理</div><div class="desc">上架 · 定价</div>
    </div>
    <div class="adm-card" @click="page='schedule';loadSchedule()">
      <div class="icon">📅</div><div class="label">档期配置</div><div class="desc">时段 · 休息日</div>
    </div>
    <div class="adm-card" @click="page='ann';loadAnn()">
      <div class="icon">📢</div><div class="label">公告管理</div><div class="desc">通知 · 活动</div>
    </div>
    <div class="adm-card" @click="page='shop';loadShop()">
      <div class="icon">⚙️</div><div class="label">店铺设置</div><div class="desc">名称 · 联系方式</div>
    </div>
    <div class="adm-card" @click="page='rules';loadSchedule()">
      <div class="icon">📋</div><div class="label">取消规则</div><div class="desc">退款政策</div>
    </div>
    <div class="adm-card" @click="exportOrders()">
      <div class="icon">📊</div><div class="label">导出报表</div><div class="desc">Excel 导出</div>
    </div>
  </div>

  <!-- Recent orders -->
  <div class="sec" v-if="dash.recent_orders?.length">
    <div class="sec-title">最近订单 <span class="sec-right" @click="page='orders';loadOrders()">查看全部 →</span></div>
  </div>
  <div v-for="o in (dash.recent_orders||[])" :key="o.id" class="ord">
    <div class="ord-top">
      <span class="ord-no">{{o.order_no}}</span>
      <span class="badge" :class="'badge-'+o.status">{{statusText(o.status)}}</span>
    </div>
    <div class="ord-body">
      <div class="ord-pkg">{{o.package_name}}</div>
      <div class="ord-info">
        👤 <b>{{o.customer_name}}</b> · 📅 {{o.booking_date}} {{o.time_slot}}
      </div>
    </div>
    <div class="ord-foot">
      <span class="ord-amount">¥{{o.final_amount || o.amount}}</span>
      <span class="ord-time">{{o.created_at?.split(' ')[0]}}</span>
    </div>
  </div>
</div>

<!-- ═══════ Orders ═══════ -->
<div v-show="page==='orders'" class="page" style="padding-bottom:24px">
  <div class="hdr">
    <button class="hdr-back" @click="page='dashboard'">← 返回</button>
    <div class="hdr-title">订单管理</div>
    <div style="width:48px"></div>
  </div>
  <div style="padding:12px 16px 0">
    <div style="display:flex;gap:8px;align-items:center;background:var(--card);border-radius:var(--rs);padding:0 12px;border:1.5px solid var(--ink-llll)">
      <span style="font-size:14px;opacity:.4">🔍</span>

      {{f===null?'全部':statusText(f)}}

    </div>

      <span class="ord-amount">¥{{o.final_amount || o.amount}}</span>
      <div class="ord-acts">
        <button v-if="o.status==='booked'" class="btn btn-ok btn-sm" @click="completeOrder(o)">核销</button>

<script>
const{createApp,ref,reactive,onMounted}=Vue;
const API='/api';

createApp({
  setup(){
    const merchant=ref(null);
    const token=ref(localStorage.getItem('merchant_token')||'');
    const page=ref('dashboard');
    const toast=ref('');
    const toastMsg=ref('');
    const loginForm=reactive({username:'',password:''});
    const loginError=ref('');
    const loginLoading=ref(false);
    const dash=ref({});
    const allOrders=ref([]);
    const orderFilter=ref(null);
    const photos=ref([]);
    const categories=ref([]);
    const packages=ref([]);
    const schedConfig=ref([]);
    const schedClosed=ref([]);
    const cancelRules=ref({free_cancel_hours:24,fee_type:'none',fee_value:0});
    const newSlotStart=ref('');
    const newSlotEnd=ref('');
    const newClosedDate=ref('');
    const newPhoto=reactive({title:'',image_url:'',category_id:'',tags:''});
    const newPkg=reactive({name:'',price:0,description:'',duration_minutes:120,cover:'',person_count:1});
    const newCatName=ref('');
    const announcements=ref([]);
    const newAnn=reactive({title:'',content:'',type:'info'});
    const shopForm=reactive({shop_name:'',shop_slogan:'',phone:'',wechat:'',address:'',business_hours:'',holiday_note:'',about:''});
    const passForm=reactive({old:'',new:''});
    const orderSearch=ref('');
    let searchTimer=null;
    const weekNames=['周日','周一','周二','周三','周四','周五','周六'];
    const todayStr=new Date().toISOString().slice(5,10);

    function showToast(msg,dur=2000){toastMsg.value=msg;toast.value=true;setTimeout(()=>{toast.value=false;toastMsg.value=''},dur)}
    function statusText(s){return{pending:'待支付',booked:'已预约',completed:'已完成',cancelled:'已取消'}[s]||s}

    async function api(path,opt={}){
      const h={'Content-Type':'application/json'};
      if(token.value)h['x-merchant-token']=token.value;
      const r=await fetch(API+path,{...opt,headers:{...h,...opt.headers}});
      if(!r.ok){const e=await r.json().catch(()=>({}));throw new Error(e.error||'请求失败')}
      return r.json();
    }

    async function doLogin(){
      loginError.value='';loginLoading.value=true;
      try{
        const d=await api('/merchant/login',{method:'POST',body:JSON.stringify(loginForm)});
        token.value=d.token;merchant.value=d.merchant;
        localStorage.setItem('merchant_token',d.token);
        loadDashboard();
      }catch(e){loginError.value=e.message}
      finally{loginLoading.value=false}
    }

    async function doLogout(){
      try{await api('/merchant/logout',{method:'POST'})}catch(e){}
      token.value='';merchant.value=null;localStorage.removeItem('merchant_token');
    }

    async function checkAuth(){
      if(!token.value)return;
      try{merchant.value=await api('/merchant/me');loadDashboard()}catch(e){token.value='';localStorage.removeItem('merchant_token')}
    }

    async function loadDashboard(){try{dash.value=await api('/dashboard/stats')}catch(e){}}
    async function loadOrders(){const q=orderFilter.value?`?status=${orderFilter.value}`:'';allOrders.value=await api('/orders'+q)}
    function debounceOrderSearch(){
      clearTimeout(searchTimer);
      searchTimer=setTimeout(async()=>{
        if(!orderSearch.value){loadOrders();return;}
        const q=`?q=${encodeURIComponent(orderSearch.value)}${orderFilter.value?'&status='+orderFilter.value:''}`;
        allOrders.value=await api('/orders/search'+q);
      },300);
    }
    async function loadPhotos(){photos.value=await api('/photos')}
    async function loadCategories(){categories.value=await api('/categories')}
    async function loadPackages(){packages.value=await api('/packages?all=1')}
    async function loadSchedule(){const d=await api('/schedule');schedConfig.value=d.config.map(c=>({...c,time_slots:JSON.parse(c.time_slots)}));schedClosed.value=d.closed_dates;cancelRules.value=d.cancel_rules}
    async function loadAnn(){announcements.value=await api('/announcements?all=1')}
    async function loadShop(){const d=await api('/shop');Object.assign(shopForm,d)}

    async function completeOrder(o){try{await api(`/orders/${o.id}/complete`,{method:'POST'});showToast('核销成功 ✅');loadOrders()}catch(e){showToast(e.message)}}
    async function adminCancelOrder(o){try{await api(`/orders/${o.id}/cancel`,{method:'POST',body:JSON.stringify({reason:'商家取消'})});showToast('已取消');loadOrders()}catch(e){showToast(e.message)}}
    async function addPhoto(){try{await api('/photos',{method:'POST',body:JSON.stringify(newPhoto)});showToast('已添加 📷');newPhoto.title='';newPhoto.image_url='';newPhoto.tags='';loadPhotos()}catch(e){showToast(e.message)}}
    async function deletePhoto(p){try{await api(`/photos/${p.id}`,{method:'DELETE'});showToast('已删除');loadPhotos()}catch(e){showToast(e.message)}}
    async function addCategory(){if(!newCatName.value)return;try{await api('/categories',{method:'POST',body:JSON.stringify({name:newCatName.value})});newCatName.value='';loadCategories();showToast('已添加')}catch(e){showToast(e.message)}}
    async function deleteCategory(c){try{await api(`/categories/${c.id}`,{method:'DELETE'});loadCategories();showToast('已删除')}catch(e){showToast(e.message)}}
    async function addPkg(){try{await api('/packages',{method:'POST',body:JSON.stringify(newPkg)});showToast('已添加 💄');newPkg.name='';newPkg.price=0;newPkg.description='';newPkg.cover='';loadPackages()}catch(e){showToast(e.message)}}
    async function togglePkgActive(p){try{await api(`/packages/${p.id}`,{method:'PUT',body:JSON.stringify({...p,is_active:p.is_active?0:1,person_count:p.person_count||1})});loadPackages()}catch(e){showToast(e.message)}}
    async function deletePkg(p){try{await api(`/packages/${p.id}`,{method:'DELETE'});loadPackages();showToast('已删除')}catch(e){showToast(e.message)}}
    async function saveSchedule(){try{await api('/schedule',{method:'PUT',body:JSON.stringify({config:schedConfig.value,closed_dates:schedClosed.value})});showToast('已保存 📅')}catch(e){showToast(e.message)}}
    async function saveRules(){try{await api('/schedule',{method:'PUT',body:JSON.stringify({cancel_rules:cancelRules.value})});showToast('已保存 ⚙️')}catch(e){showToast(e.message)}}
    async function addAnn(){try{await api('/announcements',{method:'POST',body:JSON.stringify(newAnn)});showToast('已发布 📢');newAnn.title='';newAnn.content='';loadAnn()}catch(e){showToast(e.message)}}
    async function toggleAnn(a){try{await api(`/announcements/${a.id}`,{method:'PUT',body:JSON.stringify({...a,is_active:a.is_active?0:1})});loadAnn()}catch(e){showToast(e.message)}}
    async function deleteAnn(a){try{await api(`/announcements/${a.id}`,{method:'DELETE'});showToast('已删除');loadAnn()}catch(e){showToast(e.message)}}
    async function saveShop(){try{await api('/shop',{method:'PUT',body:JSON.stringify(shopForm)});showToast('已保存 ⚙️')}catch(e){showToast(e.message)}}
    async function changePass(){try{await api('/merchant/password',{method:'POST',body:JSON.stringify({old_password:passForm.old,new_password:passForm.new})});showToast('密码已修改 ✅');passForm.old='';passForm.new=''}catch(e){showToast(e.message)}}
    function exportOrders(){window.open(API+'/orders/export','_blank')}

    onMounted(()=>checkAuth());

    return{
      merchant,page,toast,toastMsg,loginForm,loginError,loginLoading,
      dash,allOrders,orderFilter,photos,categories,packages,
      schedConfig,schedClosed,cancelRules,newSlotStart,newSlotEnd,newClosedDate,
      newPhoto,newPkg,newCatName,announcements,newAnn,shopForm,passForm,
      weekNames,todayStr,orderSearch,debounceOrderSearch,
      doLogin,doLogout,statusText,showToast,
      loadDashboard,loadOrders,loadPhotos,loadCategories,loadPackages,loadSchedule,loadAnn,loadShop,
      completeOrder,adminCancelOrder,addPhoto,deletePhoto,addCategory,deleteCategory,
      addPkg,togglePkgActive,deletePkg,saveSchedule,saveRules,
      addAnn,toggleAnn,deleteAnn,saveShop,changePass,exportOrders
    };
  }
}).mount('#app');
</script>
</body>
</html>
